name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install -e .[dev]

      - name: Validate required files
        run: |
          test -f README.md
          test -f LICENSE
          test -f .gitignore
          test -f CONTRIBUTING.md
          test -f pyproject.toml
          test -f docs/personal-operations-harness.md
          test -f docs/architecture.md
          test -f docs/roadmap.md
          test -f docs/data-model.md
          test -f docs/open-source-project-shape.md

      - name: Check markdown files are non-empty
        run: |
          while IFS= read -r file; do
            test -s "$file"
          done < <(find . -name '*.md' -type f | sort)

      - name: Check YAML syntax
        run: |
          python - <<'PY'
          import pathlib, yaml
          files = sorted(pathlib.Path('.github').rglob('*.yml')) + sorted(pathlib.Path('.github').rglob('*.yaml'))
          for path in files:
              with open(path, 'r', encoding='utf-8') as f:
                  yaml.safe_load(f)
          print(f"validated {len(files)} yaml files")
          PY

      - name: Run tests
        run: pytest -q
