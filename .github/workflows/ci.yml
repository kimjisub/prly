name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PyYAML
        run: python -m pip install pyyaml

      - name: Validate required files
        run: |
          test -f README.md
          test -f LICENSE
          test -f .gitignore
          test -f docs/personal-operations-harness.md

      - name: Check markdown files are non-empty
        run: |
          while IFS= read -r file; do
            test -s "$file"
          done < <(find . -name '*.md' -type f | sort)

      - name: Check YAML syntax
        run: |
          python - <<'PY'
          import pathlib, yaml
          files = sorted(pathlib.Path('.github').rglob('*.yml')) + sorted(pathlib.Path('.github').rglob('*.yaml'))
          for path in files:
              with open(path, 'r', encoding='utf-8') as f:
                  yaml.safe_load(f)
          print(f"validated {len(files)} yaml files")
          PY
